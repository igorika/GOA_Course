<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: white;
    }
    .container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 70%;
      padding: 25px;
      background-color: yellow;
      border: 1px solid wheat;
      border-radius: 10px;
      box-shadow: 0 4px 6px black;
    }
    .child {
      width: 120px;
      height: 120px;
      background-color: skyblue;
      border-radius: 10px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="child">first</div>
    <div class="child">second</div>
    <div class="child">third</div>
    <div class="child">fourth</div>
  </div>
</body>
</html>
